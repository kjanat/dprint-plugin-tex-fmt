#:schema https://gist.githubusercontent.com/kjanat/1172d9d2d6dbe7c6d9983aaabef2eea5/raw/cargo-config.bundle.json

[alias]
# one-letter
t = "test"

# short
cl     = "clippy --all-targets"
lint   = "cl -- -D warnings"
schema = "build"

# wasm
check-wasm = "check --lib --target wasm32-unknown-unknown"
wasm       = "build --profile wasm-release --target wasm32-unknown-unknown"

[term]
hyperlinks = false
