---
name: CI

on:
  push: { branches: [master] }
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint + schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
      - run: cargo lint
      - run: cargo schema
      - run: git diff --exit-code schema.json

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  check-wasm:
    name: Check (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --lib --target wasm32-unknown-unknown

  wasm-build:
    name: Wasm release build
    needs: check-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --profile wasm-release --target wasm32-unknown-unknown
      - run: ls -lh target/wasm32-unknown-unknown/wasm-release/*.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-wasm
          path: target/wasm32-unknown-unknown/wasm-release/dprint_plugin_tex_fmt.wasm

  e2e:
    name: End-to-end (wasm + dprint)
    needs: [lint, test, wasm-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: plugin-wasm
          path: target/wasm32-unknown-unknown/wasm-release/
      - uses: kjanat/install-dprint@v1
      - run: bash scripts/e2e.sh
